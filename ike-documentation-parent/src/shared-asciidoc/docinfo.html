<style>
/* ── Koncept Inline Notation ──────────────────────────────────── */
/* Styles the koncept: inline macro output.                         */
/* Source: koncept:Name[url=..., uuid=...]                          */
/* Renders: K[Name] with distinctive visual treatment               */

.koncept,
.koncept-link {
    font-variant: normal;
    white-space: nowrap;
    /* Subtle background pill for scannability */
    background-color: #f0f5ff;
    border-radius: 3px;
    padding: 1px 4px 1px 2px;
    display: inline;
}

.koncept-k {
    color: #2563eb;            /* blue-600 — IKE K-brand color */
    font-weight: 700;
    font-family: 'Noto Sans', 'Inter', -apple-system, sans-serif;
    font-size: 0.92em;
}

.koncept-bracket {
    color: #94a3b8;            /* slate-400 — recedes visually */
    font-weight: 400;
    font-size: 0.88em;
}

.koncept-name {
    font-variant: small-caps;
    color: #1e3a5f;            /* dark blue — authoritative, distinct from body */
    letter-spacing: 0.03em;
    font-size: 0.95em;
}

/* Linked Koncepts */
.koncept-link {
    text-decoration: none;
    border-bottom: 1px dotted #2563eb;
    cursor: pointer;
    transition: background-color 0.15s ease;
}

.koncept-link:hover {
    background-color: #dbeafe; /* blue-100 */
    border-bottom-style: solid;
}

.koncept-link:hover .koncept-name {
    color: #2563eb;
}


/* ── Mermaid ER Diagram Edge Fix ──────────────────────────────── */
/* Mermaid's ER renderer generates edge paths with a corrupted      */
/* style attribute: style="undefined;undefined stroke:#333333;..."  */
/* The "undefined;undefined" prefix causes CSS parsers to skip the  */
/* stroke declaration, making relationship lines invisible.         */
/* These !important rules override the broken inline styles.        */

.erDiagram .edgePaths path[data-edge="true"] {
    stroke: #333333 !important;
    stroke-width: 1 !important;
    fill: none !important;
}

/* Also catch edges without the data-edge attribute (older Mermaid) */
.erDiagram .edgePaths path {
    stroke: #333333 !important;
    stroke-width: 1 !important;
    fill: none !important;
}
</style>
