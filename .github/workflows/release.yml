# ────────────────────────────────────────────────────────────────────
# Release Workflow — triggered by push to release/* branches
# ────────────────────────────────────────────────────────────────────
# This workflow:
#   1. Builds and tests the release branch
#   2. Deploys artifacts (if configured)
#   3. Tags the release commit
#   4. Merges the release branch back to main
#
# Trigger: Push to release/* branches (created by release-from-feature.sh)
# ────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    branches:
      - 'release/*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "version=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Build and verify
        run: mvn clean verify -B

      - name: Tag release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "v${VERSION}" -m "Release ${VERSION}"
          git push origin "v${VERSION}"

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff "${GITHUB_REF#refs/heads/}" -m "merge: release ${{ steps.version.outputs.version }}"
          git push origin main
